
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#1e5c30;--g2:#154022;--a:#c8861e;--al:#f8edd6;--ad:#8b5e0f;--b:#1a6b8a;--bl:#ddf0f7;--r:#b83232;--rl:#fdeaea;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:14px;}
button{cursor:pointer;font-family:inherit;}input,select,textarea{font-family:inherit;}
.nav{background:var(--g);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--a);gap:4px;flex-wrap:wrap;}
.brand{font-family:Georgia,serif;font-size:17px;color:#fff;padding:10px 0;white-space:nowrap;}
.brand em{color:var(--a);font-style:normal;}
.nav-links{display:flex;gap:2px;align-items:center;flex-wrap:wrap;padding:4px 0;}
.nlink{color:rgba(255,255,255,0.7);background:none;border:none;padding:7px 9px;font-size:12px;border-radius:6px;transition:all 0.15s;white-space:nowrap;}
.nlink:hover{color:#fff;background:rgba(255,255,255,0.15);}
.nlink.on{color:var(--a);font-weight:500;}
.nav-user{display:flex;align-items:center;gap:6px;margin-left:6px;}
.user-chip{background:rgba(200,134,30,0.25);color:var(--a);border:1px solid rgba(200,134,30,0.4);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.lang-btn{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:5px 9px;border-radius:20px;font-size:11px;}
.view{display:none;}.view.on{display:block;}
.hero{background:linear-gradient(135deg,#122a1a 0%,var(--g) 60%,#0e3d23 100%);padding:2.5rem 1.5rem;text-align:center;}
.hero-tag{display:inline-block;background:rgba(200,134,30,0.25);color:var(--a);border:1px solid rgba(200,134,30,0.4);padding:4px 14px;border-radius:20px;font-size:11px;margin-bottom:1rem;letter-spacing:1px;text-transform:uppercase;}
.hero-h{font-family:Georgia,serif;font-size:1.8rem;color:#fff;line-height:1.25;margin-bottom:0.6rem;}
.hero-h em{color:var(--a);font-style:normal;}
.hero-sub{color:rgba(255,255,255,0.72);font-size:0.92rem;margin-bottom:1.5rem;line-height:1.6;}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-p{background:var(--a);color:#fff;border:none;padding:11px 22px;border-radius:25px;font-size:13px;font-weight:500;transition:all 0.15s;}
.btn-p:hover{background:var(--ad);}
.btn-s{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.4);padding:11px 22px;border-radius:25px;font-size:13px;transition:all 0.15s;}
.btn-s:hover{border-color:#fff;}
.loc-bar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:0.5rem 1rem;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary);}
.loc-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;}
.loc-dot.on{background:#2a9d5c;}
.loc-btn{background:none;border:1px solid var(--color-border-secondary);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--b);margin-left:auto;cursor:pointer;}
.stats{display:flex;justify-content:center;gap:1.5rem;background:var(--color-background-primary);padding:0.85rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;}
.snum{font-family:Georgia,serif;font-size:1.4rem;color:var(--a);text-align:center;}
.slbl{font-size:11px;color:var(--color-text-secondary);text-align:center;}
.sec{max-width:960px;margin:0 auto;padding:1.5rem 1rem;}
.sec-h{font-family:Georgia,serif;font-size:1.25rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:10px;}
.sec-h::after{content:'';flex:1;height:1px;background:var(--color-border-tertiary);}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.85rem;}
.step{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-top:3px solid var(--a);border-radius:12px;padding:1.1rem;text-align:center;}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--al);color:var(--ad);font-weight:bold;font-size:13px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.6rem;}
.step-t{font-weight:500;font-size:13px;margin-bottom:4px;}.step-d{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:0.85rem;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid var(--a);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.18s;}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.08);}
.card-ico{background:var(--al);padding:1rem;text-align:center;font-size:2.2rem;}
.card-body{padding:0.75rem;}
.card-name{font-weight:500;font-size:13px;margin-bottom:3px;}.card-loc{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;}
.card-dist{font-size:11px;color:var(--b);margin-bottom:4px;}
.card-price{font-family:Georgia,serif;font-size:15px;color:var(--ad);font-weight:bold;}
.card-price span{font-size:11px;color:var(--color-text-secondary);font-family:system-ui;font-weight:normal;}
.cat-tag{display:inline-block;background:#e8f5ec;color:var(--g);font-size:10px;padding:2px 7px;border-radius:10px;margin-top:5px;}
.stars-sm{color:var(--a);font-size:11px;}
.sb{display:flex;gap:8px;margin-bottom:0.85rem;}
.si{flex:1;padding:8px 12px;border:1px solid var(--color-border-secondary);border-radius:8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.2rem;}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s;}
.chip.on{background:var(--a);color:#fff;border-color:var(--a);}
.back-btn{background:none;border:none;color:var(--g);font-size:13px;display:flex;align-items:center;gap:5px;margin-bottom:1rem;padding:0;font-weight:500;cursor:pointer;}
.dcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;}
.d-ico{background:var(--al);padding:2.5rem;text-align:center;font-size:4.5rem;}
.d-body{padding:1.25rem;}
.d-title{font-family:Georgia,serif;font-size:1.4rem;margin-bottom:0.4rem;}
.d-price{font-family:Georgia,serif;font-size:1.6rem;color:var(--ad);font-weight:bold;margin-bottom:0.85rem;}
.d-info{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:1.25rem;}
.d-info label{display:block;font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;}
.d-info p{font-weight:500;font-size:13px;}
.d-desc{color:var(--color-text-secondary);line-height:1.75;font-size:13px;margin-bottom:1.2rem;}
.info-box{border-radius:8px;padding:0.85rem;margin-bottom:0.85rem;font-size:12px;}
.info-box.blue{background:var(--bl);border:1px solid rgba(26,107,138,0.2);color:var(--b);}
.info-box.amber{background:var(--al);border:1px solid rgba(200,134,30,0.25);color:var(--ad);}
.info-box-t{font-weight:600;font-size:13px;margin-bottom:6px;}
.calendar-wrap{margin-bottom:1.25rem;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-nav{background:none;border:1px solid var(--color-border-secondary);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--color-text-primary);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-lbl{text-align:center;font-size:10px;color:var(--color-text-secondary);padding:3px 0;font-weight:500;}
.cal-day{text-align:center;padding:6px 2px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all 0.1s;}
.cal-day.empty{cursor:default;}.cal-day.avail{background:#e8f5ec;color:var(--g);border-color:rgba(30,92,48,0.2);}
.cal-day.avail:hover{background:#c8e6c9;}.cal-day.unavail{background:#fee;color:#bbb;text-decoration:line-through;cursor:not-allowed;}
.cal-day.selected{background:var(--a);color:#fff;border-color:var(--a);}
.cal-day.today{font-weight:600;}
.cal-legend{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--color-text-secondary);}
.cal-legend span{display:flex;align-items:center;gap:4px;}
.cal-leg-dot{width:10px;height:10px;border-radius:2px;}
.fee-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:1rem;margin-bottom:1rem;}
.fee-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.fee-row.total{border-top:1px solid var(--color-border-tertiary);margin-top:6px;padding-top:10px;font-weight:600;font-size:14px;}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.pay-opt{border:2px solid var(--color-border-tertiary);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--color-background-primary);}
.pay-opt:hover{border-color:var(--a);}.pay-opt.on{border-color:var(--a);background:var(--al);}
.pay-opt-ico{font-size:1.5rem;margin-bottom:4px;}.pay-opt-lbl{font-size:12px;font-weight:500;}
.confirm-box{background:#e8f5ec;border:1px solid rgba(30,92,48,0.3);border-radius:10px;padding:1.25rem;display:none;}
.confirm-box.on{display:block;}
.confirm-box h4{color:var(--g);margin-bottom:8px;font-size:14px;font-weight:600;}
.phone-big{font-size:1.4rem;font-weight:700;color:var(--ad);font-family:Georgia,serif;margin:6px 0;}
.wa-btn{display:inline-flex;align-items:center;gap:6px;background:#25d366;color:#fff;border:none;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:500;margin-top:10px;cursor:pointer;}
.main-btn{width:100%;padding:13px;border-radius:25px;font-size:14px;font-weight:500;border:none;transition:all 0.15s;margin-top:4px;}
.main-btn.green{background:var(--g);color:#fff;}.main-btn.green:hover{background:var(--g2);}
.main-btn.amber{background:var(--a);color:#fff;}.main-btn.amber:hover{background:var(--ad);}
.main-btn.outline{background:transparent;color:var(--r);border:2px solid var(--r);}.main-btn.outline:hover{background:var(--rl);}
.main-btn:disabled{background:#ccc;color:#888;cursor:not-allowed;}
.review-card{background:var(--color-background-secondary);border-radius:8px;padding:0.85rem;margin-bottom:0.6rem;}
.review-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--al);color:var(--ad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.review-name{font-weight:500;font-size:13px;}.review-text{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.write-review{margin-top:1rem;border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem;}
.star-pick{display:flex;gap:4px;margin-bottom:0.5rem;}
.star-pick button{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:2px;}
.fcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1.5rem;max-width:560px;margin:0 auto;}
.f-title{font-family:Georgia,serif;font-size:1.25rem;margin-bottom:1.25rem;}
.fg{margin-bottom:1rem;}
.fl{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;}
.fi,.fs,.fta{width:100%;padding:9px 12px;border:1px solid var(--color-border-secondary);border-radius:8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);}
.fta{min-height:80px;resize:vertical;}
.fs-row{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;}
.fee-notice{background:#e8f5ec;border:1px solid rgba(30,92,48,0.2);border-radius:8px;padding:0.85rem;margin-bottom:1rem;font-size:12px;color:var(--g2);}
.success-bar{background:#e8f5ec;border:1px solid rgba(30,92,48,0.3);border-radius:8px;padding:0.85rem 1.1rem;color:var(--g);font-weight:500;font-size:13px;margin-bottom:1rem;}
.err-bar{background:var(--rl);border:1px solid rgba(184,50,50,0.3);border-radius:8px;padding:0.85rem 1.1rem;color:var(--r);font-size:13px;margin-bottom:1rem;}
.my-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid var(--g);border-radius:12px;padding:0.85rem;display:flex;align-items:center;gap:0.85rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.15s;}
.my-card:hover{transform:translateY(-1px);}
.my-card-ico{font-size:1.8rem;background:#e8f5ec;padding:0.6rem;border-radius:8px;}
.my-card-info{flex:1;}.my-card-name{font-weight:500;font-size:13px;}.my-card-price{font-size:12px;color:var(--ad);}
.my-card-badge{font-size:10px;background:#e8f5ec;color:var(--g);padding:3px 8px;border-radius:10px;white-space:nowrap;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--color-text-secondary);}
.empty-ico{font-size:2.5rem;margin-bottom:0.75rem;}
.profile-header{background:linear-gradient(135deg,var(--g2),var(--g));padding:2rem 1.5rem;border-radius:12px;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.25rem;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--al);color:var(--ad);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;flex-shrink:0;border:3px solid rgba(200,134,30,0.5);}
.profile-name{font-family:Georgia,serif;font-size:1.3rem;color:#fff;margin-bottom:3px;}
.profile-sub{font-size:12px;color:rgba(255,255,255,0.65);}
.earn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1.25rem;}
.earn-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:0.85rem;text-align:center;}
.earn-num{font-family:Georgia,serif;font-size:1.25rem;color:var(--ad);font-weight:bold;}
.earn-lbl{font-size:10px;color:var(--color-text-secondary);margin-top:2px;}
.auth-wrap{max-width:420px;margin:2rem auto;padding:0 1rem;}
.auth-tabs{display:flex;background:var(--color-background-secondary);border-radius:10px;padding:4px;margin-bottom:1.25rem;gap:4px;}
.auth-tab{flex:1;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:500;background:transparent;color:var(--color-text-secondary);transition:all 0.15s;}
.auth-tab.on{background:var(--color-background-primary);color:var(--color-text-primary);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.divider{display:flex;align-items:center;gap:8px;margin:1rem 0;color:var(--color-text-secondary);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--color-border-tertiary);}
.auth-lock{text-align:center;padding:2rem 1rem;}
.auth-lock-ico{font-size:3rem;margin-bottom:0.75rem;}
footer{background:var(--g);color:rgba(255,255,255,0.55);text-align:center;font-size:11px;padding:1.25rem;margin-top:2rem;}
footer strong{color:var(--a);}
.platform-note{background:rgba(255,255,255,0.08);border-radius:8px;padding:0.75rem 1rem;margin-top:0.75rem;font-size:11px;line-height:1.6;}
.badge-verified{display:inline-flex;align-items:center;gap:4px;background:#e8f5ec;color:var(--g);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.loading-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<nav class="nav">
  <div class="brand">Lend<em>It</em> Malawi</div>
  <div class="nav-links">
    <button class="nlink on" onclick="nav('home')" id="n-home">🏠 <span data-k="home"></span></button>
    <button class="nlink" onclick="nav('browse')" id="n-browse">🔍 <span data-k="browse"></span></button>
    <button class="nlink" onclick="guardNav('list')" id="n-list">➕ <span data-k="listNav"></span></button>
    <button class="nlink" onclick="nav('account')" id="n-account">👤 <span id="nav-user-label" data-k="account"></span></button>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">🌐 EN</button>
  </div>
</nav>

<!-- HOME -->
<div id="v-home" class="view on">
  <div class="hero">
    <div class="hero-tag">🇲🇼 Made for Malawi</div>
    <h1 class="hero-h"><span data-k="h1"></span><br><em><span data-k="h2"></span></em></h1>
    <p class="hero-sub" data-k="hsub"></p>
    <div class="hero-btns">
      <button class="btn-p" onclick="nav('browse')" data-k="hbrowse"></button>
      <button class="btn-s" onclick="guardNav('list')" data-k="hlist"></button>
    </div>
  </div>
  <div class="loc-bar">
    <div class="loc-dot" id="loc-dot"></div>
    <span id="loc-text" data-k="locOff"></span>
    <button class="loc-btn" onclick="requestLocation()" id="loc-btn" data-k="enableLoc"></button>
  </div>
  <div class="stats">
    <div><div class="snum" id="stat-n">8</div><div class="slbl" data-k="sListings"></div></div>
    <div><div class="snum" id="stat-users">1</div><div class="slbl" data-k="sUsers"></div></div>
    <div><div class="snum">10%</div><div class="slbl" data-k="sFee"></div></div>
    <div><div class="snum">📱</div><div class="slbl" data-k="sPay"></div></div>
  </div>
  <div class="sec">
    <h2 class="sec-h" data-k="hiw"></h2>
    <div class="steps">
      <div class="step"><div class="step-n">1</div><div class="step-t" data-k="s1t"></div><div class="step-d" data-k="s1d"></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-t" data-k="s2t"></div><div class="step-d" data-k="s2d"></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-t" data-k="s3t"></div><div class="step-d" data-k="s3d"></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-t" data-k="s4t"></div><div class="step-d" data-k="s4d"></div></div>
    </div>
  </div>
  <div class="sec" style="padding-top:0">
    <h2 class="sec-h" data-k="featured"></h2>
    <div class="grid" id="home-grid"></div>
  </div>
  <footer><strong>LendIt Malawi</strong> — <span data-k="footLine"></span><div class="platform-note">🔐 <span data-k="footSec"></span></div></footer>
</div>

<!-- BROWSE -->
<div id="v-browse" class="view">
  <div class="sec">
    <div class="sb"><input class="si" id="s-inp" oninput="applyF()" data-k-ph="search" placeholder=""></div>
    <div class="chips" id="chips"></div>
    <div id="res-count" style="font-size:12px;color:var(--color-text-secondary);margin-bottom:0.85rem;"></div>
    <div class="grid" id="browse-grid"></div>
  </div>
</div>

<!-- LIST -->
<div id="v-list" class="view">
  <div class="sec">
    <div id="s-bar" style="display:none" class="success-bar"></div>
    <div class="fcard">
      <h2 class="f-title" data-k="listTitle"></h2>
      <div class="fee-notice"><strong>💰 <span data-k="feeNoticeT"></span></strong> — <span data-k="feeNoticeD"></span></div>
      <div class="fg"><label class="fl" data-k="fName"></label><input class="fi" id="f-name" type="text"></div>
      <div class="fg"><label class="fl" data-k="fDesc"></label><textarea class="fta" id="f-desc"></textarea></div>
      <div class="fs-row">
        <div class="fg"><label class="fl" data-k="fPrice"></label><input class="fi" id="f-price" type="number" min="100" placeholder="MK"></div>
        <div class="fg"><label class="fl" data-k="fDeposit"></label><input class="fi" id="f-dep" type="number" min="0" placeholder="MK"></div>
      </div>
      <div class="fs-row">
        <div class="fg"><label class="fl" data-k="fCat"></label>
          <select class="fs" id="f-cat">
            <option value="garden" data-k="cGarden"></option><option value="tools" data-k="cTools"></option>
            <option value="kitchen" data-k="cKitchen"></option><option value="electronics" data-k="cElec"></option>
            <option value="transport" data-k="cTransport"></option><option value="events" data-k="cEvents"></option>
          </select>
        </div>
        <div class="fg"><label class="fl" data-k="fPay"></label>
          <select class="fs" id="f-pay">
            <option value="airtel">Airtel Money</option><option value="tnm">TNM Mpamba</option><option value="both" data-k="fBoth"></option>
          </select>
        </div>

async function hashPw(pw){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(pw+'lendit-mw-2024'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

  const loc=document.getElementById('r-loc').value.trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  const errEl=document.getElementById('reg-err');
  const showErr=msg=>{errEl.textContent=msg;errEl.style.display='block';};
  errEl.style.display='none';
  if(!phone){showErr(t('errPhoneReq'));return;}
  if(!first){showErr(t('errNameReq'));return;}
  if(!loc){showErr(t('errLocReq'));return;}
  if(pw.length<6){showErr(t('errPwShort'));return;}
  if(pw!==pw2){showErr(t('errPwMatch'));return;}
  const btn=document.getElementById('reg-btn');
  btn.innerHTML=`<span class="loading-spin"></span> Creating account...`;btn.disabled=true;
  try{
    const key=`lm-user:${phone.replace(/\s/g,'')}`;
    let exists=false;
    try{const ex=await window.storage.get(key);if(ex)exists=true;}catch(e){}
    if(exists){showErr(t('errPhoneExists'));btn.textContent=t('createBtn');btn.disabled=false;return;}
    const hash=await hashPw(pw);
    const user={id:Date.now(),name:`${first} ${last}`.trim(),phone:phone.replace(/\s/g,''),location:loc,passwordHash:hash,joinedAt:new Date().toISOString()};
    await window.storage.set(key,JSON.stringify(user));
    memberCount++;await saveStorage();
    session=user;onLogin();
  }catch(e){showErr('Something went wrong. Please try again.');btn.textContent=t('createBtn');btn.disabled=false;}
}

async function doLogin(){
  const phone=document.getElementById('l-phone').value.trim();
  const pw=document.getElementById('l-pw').value;
  const errEl=document.getElementById('login-err');
  const showErr=msg=>{errEl.textContent=msg;errEl.style.display='block';};
  errEl.style.display='none';
  if(!phone){showErr(t('errPhone'));return;}
  if(!pw){showErr(t('errPw'));return;}
  const btn=document.getElementById('login-btn');
  btn.innerHTML=`<span class="loading-spin"></span> Logging in...`;btn.disabled=true;
  try{
    const key=`lm-user:${phone.replace(/\s/g,'')}`;
    let userData=null;
    try{const r=await window.storage.get(key);if(r)userData=JSON.parse(r.value);}catch(e){}
    if(!userData){showErr(t('errNoUser'));btn.textContent=t('loginBtn');btn.disabled=false;return;}
    const hash=await hashPw(pw);
    if(hash!==userData.passwordHash){showErr(t('errWrongPw'));btn.textContent=t('loginBtn');btn.disabled=false;return;}
    session=userData;onLogin();
  }catch(e){showErr('Something went wrong.');btn.textContent=t('loginBtn');btn.disabled=false;}
}

function onLogin(){
  document.getElementById('l-phone').value='';document.getElementById('l-pw').value='';
  document.getElementById('login-btn').textContent=t('loginBtn');document.getElementById('login-btn').disabled=false;
  document.getElementById('reg-btn').textContent=t('createBtn');document.getElementById('reg-btn').disabled=false;
  updateNavUser();renderAccount();nav('account');
  document.getElementById('stat-users').textContent=memberCount;
}

function logout(){
  session=null;updateNavUser();renderAccount();nav('home');
}

function updateNavUser(){
  const lbl=document.getElementById('nav-user-label');
  if(session){lbl.textContent=session.name.split(' ')[0];}
  else{lbl.setAttribute('data-k','account');lbl.textContent=t('account');}
}

function switchTab(tab){
  document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
  document.getElementById('auth-reg').style.display=tab==='register'?'block':'none';
  document.getElementById('tab-login').classList.toggle('on',tab==='login');
  document.getElementById('tab-reg').classList.toggle('on',tab==='register');
  document.getElementById('login-err').style.display='none';
  document.getElementById('reg-err').style.display='none';
}

function renderAccount(){
  const loggedIn=document.getElementById('account-logged-in');
  const loggedOut=document.getElementById('account-logged-out');
  if(session){
    loggedIn.style.display='block';loggedOut.style.display='none';
    const initials=session.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('p-avatar').textContent=initials;
    document.getElementById('p-name').textContent=session.name;
    document.getElementById('p-phone').textContent='📱 '+session.phone;
    document.getElementById('p-location').textContent='📍 '+(session.location||'');
    const userListings=myListings.filter(l=>l.userId===session.id);
    const bookings=userListings.reduce((s,l)=>(s+(l.bookedDates||[]).length),0);
    const earned=userListings.reduce((s,l)=>(s+l.price*(l.bookedDates||[]).length*0.9),0);
    document.getElementById('p-listings').textContent=userListings.length;
    document.getElementById('p-bookings').textContent=bookings;
    document.getElementById('p-earned').textContent='MK '+Math.round(earned).toLocaleString();
    renderMine(userListings);
  } else {
    loggedIn.style.display='none';loggedOut.style.display='block';
  }
}

function renderMine(userListings){
  const ml=document.getElementById('mine-list');if(!ml)return;
  const items=userListings||[];
  if(!items.length){ml.innerHTML=`<div class="empty"><div class="empty-ico">📦</div><p style="font-weight:500">${t('myEmpty')}</p><p style="font-size:12px;margin-top:4px">${t('myEmptySub')}</p></div>`;return;}
  ml.innerHTML=items.map(item=>`<div class="my-card" onclick="openDetail(${item.id})"><div class="my-card-ico">${item.emoji||'📦'}</div><div class="my-card-info"><div class="my-card-name">${item.name}</div><div class="my-card-price">MK ${item.price.toLocaleString()} ${t('perDay')}</div><div style="font-size:11px;color:var(--color-text-secondary)">📍 ${item.location}</div></div><span class="my-card-badge">✓ Active</span></div>`).join('');
}

function updateTexts(){
  document.querySelectorAll('[data-k]').forEach(el=>{const k=el.getAttribute('data-k');if(el.tagName!=='OPTION'||el.closest('select'))el.textContent=t(k);});
  document.querySelectorAll('[data-k-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-k-ph'));});
  document.getElementById('lang-btn').textContent='🌐 '+(lang==='en'?'EN':'NY');
  document.querySelectorAll('option[data-k]').forEach(o=>o.textContent=t(o.getAttribute('data-k')));
  renderChips();renderHomeGrid();renderBrowseGrid();
  document.getElementById('stat-n').textContent=listings.length;
  document.getElementById('stat-users').textContent=memberCount;
  updateNavUser();
}
function toggleLang(){lang=lang==='en'?'ny':'en';updateTexts();}

function guardNav(view){
  if(!session){
    const msg=document.getElementById('auth-msg');
    if(msg){msg.textContent=lang==='en'?'Please login or register to list an asset.':'Lowani kapena lembani kuti mulembe chinthu.';msg.style.display='block';}
    nav('account');
  } else {
    nav(view);
  }
}

function nav(view){
  prevView=currentView;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nlink').forEach(b=>b.classList.remove('on'));
  document.getElementById('v-'+view).classList.add('on');
  const nb=document.getElementById('n-'+view);if(nb)nb.classList.add('on');
  currentView=view;
  if(view==='browse')renderBrowseGrid();
  if(view==='account')renderAccount();
  if(view==='home'){renderHomeGrid();}
}
function goBack(){nav(prevView==='detail'?'browse':prevView);}

function dist(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function requestLocation(){if(!navigator.geolocation){alert('GPS not available.');return;}navigator.geolocation.getCurrentPosition(p=>{userLat=p.coords.latitude;userLng=p.coords.longitude;document.getElementById('loc-dot').classList.add('on');document.getElementById('loc-text').textContent=t('locOn');document.getElementById('loc-btn').style.display='none';renderHomeGrid();renderBrowseGrid();},()=>alert('Could not get location.'));}
function fillLocation(){if(userLat){document.getElementById('f-loc').value=`${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;}else{requestLocation();}}
function getDistText(item){if(userLat&&item.lat){return `${Math.round(dist(userLat,userLng,item.lat,item.lng))} ${t('distKm')}`;}return null;}
function catLabel(c){const m={garden:'cGarden',tools:'cTools',kitchen:'cKitchen',electronics:'cElec',transport:'cTransport',events:'cEvents'};return t(m[c]||'cGarden');}
function stars(n,t=5){return '★'.repeat(n)+'☆'.repeat(t-n);}
function avgStars(reviews){if(!reviews||!reviews.length)return 0;return Math.round(reviews.reduce((a,r)=>a+r.stars,0)/reviews.length);}

function cardHTML(item){
  const name=lang==='ny'&&item.nameny?item.nameny:item.name;
  const dt=getDistText(item);
  const avg=avgStars(item.reviews);
  return `<div class="card" onclick="openDetail(${item.id})">
    <div class="card-ico">${item.emoji||EMOJIS[item.category]||'📦'}</div>
    <div class="card-body">
      <div class="card-name">${name}</div>
      <div class="card-loc">📍 ${item.location}</div>
      ${dt?`<div class="card-dist">📍 ${dt}</div>`:''}
      <div class="card-price">MK ${item.price.toLocaleString()}<span> ${t('perDay')}</span></div>
      <span class="cat-tag">${catLabel(item.category)}</span>
      ${avg?`<div class="stars-sm">${stars(avg)} (${item.reviews.length})</div>`:''}
    </div>
  </div>`;
}

function renderHomeGrid(){const g=document.getElementById('home-grid');if(!g)return;let items=[...listings];if(userLat)items.sort((a,b)=>(!a.lat?99:dist(userLat,userLng,a.lat,a.lng))-(!b.lat?99:dist(userLat,userLng,b.lat,b.lng)));g.innerHTML=items.slice(0,6).map(cardHTML).join('');}
function applyF(){searchQ=(document.getElementById('s-inp')||{}).value||'';renderBrowseGrid();}
function setFilter(cat){filterCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.cat===cat));renderBrowseGrid();}
function renderChips(){const cats=[['all','catAll'],['garden','cGarden'],['tools','cTools'],['kitchen','cKitchen'],['electronics','cElec'],['transport','cTransport'],['events','cEvents']];const ch=document.getElementById('chips');if(ch)ch.innerHTML=cats.map(([c,k])=>`<button class="chip${filterCat===c?' on':''}" data-cat="${c}" onclick="setFilter('${c}')">${t(k)}</button>`).join('');}
function renderBrowseGrid(){const q=searchQ.toLowerCase();let items=listings.filter(i=>{const n=(lang==='ny'&&i.nameny?i.nameny:i.name).toLowerCase();const d=(lang==='ny'&&i.descny?i.descny:i.desc).toLowerCase();return(!q||n.includes(q)||d.includes(q)||i.location.toLowerCase().includes(q))&&(filterCat==='all'||i.category===filterCat);});if(userLat)items.sort((a,b)=>(!a.lat?99:dist(userLat,userLng,a.lat,a.lng))-(!b.lat?99:dist(userLat,userLng,b.lat,b.lng)));const rc=document.getElementById('res-count');if(rc)rc.textContent=`${items.length} ${t('results')}`;const g=document.getElementById('browse-grid');if(g)g.innerHTML=items.length?items.map(cardHTML).join(''):`<div style="text-align:center;padding:3rem;color:var(--color-text-secondary)">${t('noResults')}</div>`;}

function openDetail(id){selId=id;selDays=[];payMethod=null;bookingDone=false;selStar=0;const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();renderDetail();prevView=currentView;nav('detail');}

function renderDetail(){
  const item=listings.find(l=>l.id===selId);if(!item)return;
  const name=lang==='ny'&&item.nameny?item.nameny:item.name;
  const desc=lang==='ny'&&item.descny?item.descny:item.desc;
  document.getElementById('d-ico').textContent=item.emoji||'📦';
  document.getElementById('d-title').textContent=name;
  document.getElementById('d-price').innerHTML=`MK ${item.price.toLocaleString()} <span style="font-size:13px;font-weight:400;color:var(--color-text-secondary);font-family:system-ui">${t('perDay')}</span>`;
  document.getElementById('d-desc').textContent=desc;
  const dt=getDistText(item);
  document.getElementById('d-info').innerHTML=`<div><label>${t('dLoc')}</label><p>${item.location}</p></div><div><label>${t('dCat')}</label><p>${catLabel(item.category)}</p></div><div><label>${t('dOwner')}</label><p>${item.owner||'Anonymous'}</p></div><div><label>${t('dDist')}</label><p>${dt||t('distUnknown')}</p></div>`;
  document.getElementById('d-map-content').innerHTML=item.lat?`📍 ${item.lat.toFixed(4)}°S, ${item.lng.toFixed(4)}°E — ${item.location}`:`📍 ${item.location}`;
  document.getElementById('confirm-box').classList.remove('on');
  document.getElementById('fee-box').style.display='none';
  document.getElementById('pay-method-pick').style.display='none';
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('main-btn-area').style.display='block';
  renderCal();renderReviews();updateMainBtn();
}

function renderCal(){
  const item=listings.find(l=>l.id===selId);if(!item)return;
  document.getElementById('cal-lbl').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const first=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  let html=DAY_LABELS.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const booked=(item.bookedDates||[]).includes(d);
    const sel=selDays.includes(d);
    const past=new Date(calYear,calMonth,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const isToday=today.getDate()===d&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    let cls='cal-day';
    if(past||booked)cls+=' unavail';
    else if(sel)cls+=' selected';
    else cls+=' avail';
    if(isToday)cls+=' today';
    const click=(past||booked)?'':`onclick="toggleDay(${d})"`;
    html+=`<div class="${cls}" ${click}>${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function toggleDay(d){if(bookingDone)return;const i=selDays.indexOf(d);if(i>-1)selDays.splice(i,1);else selDays.push(d);selDays.sort((a,b)=>a-b);renderCal();updateFeeBox();updateMainBtn();}
function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}

function updateFeeBox(){
  const item=listings.find(l=>l.id===selId);if(!item||!selDays.length){document.getElementById('fee-box').style.display='none';document.getElementById('pay-method-pick').style.display='none';return;}
  document.getElementById('fee-box').style.display='block';
  document.getElementById('pay-method-pick').style.display=session?'block':'none';
  const rental=item.price*selDays.length,dep=item.deposit||0,pfee=Math.round(rental*0.1),total=rental+dep+pfee;
  document.getElementById('f-rental').textContent=`MK ${rental.toLocaleString()} (${selDays.length}d)`;
  document.getElementById('f-dep-show').textContent=`MK ${dep.toLocaleString()}`;
  document.getElementById('f-pfee').textContent=`MK ${pfee.toLocaleString()}`;
  document.getElementById('f-total').textContent=`MK ${total.toLocaleString()}`;
}

function selectPay(m){payMethod=m;document.getElementById('po-airtel').classList.toggle('on',m==='airtel');document.getElementById('po-tnm').classList.toggle('on',m==='tnm');updateMainBtn();}

function updateMainBtn(){
  const btn=document.getElementById('main-action-btn');const gate=document.getElementById('auth-gate');if(!btn)return;
  if(bookingDone){document.getElementById('main-btn-area').style.display='none';return;}
  if(!selDays.length){btn.textContent=t('selectDates');btn.disabled=false;gate.style.display='none';document.getElementById('main-btn-area').style.display='block';return;}
  if(!session){gate.style.display='block';document.getElementById('main-btn-area').style.display='none';return;}
  gate.style.display='none';document.getElementById('main-btn-area').style.display='block';
  btn.textContent=t('confirmPay');btn.disabled=!payMethod;
}

function handleMainAction(){
  if(!selDays.length)return;
  if(!session){nav('account');return;}
  if(!payMethod){alert(t('choosePay'));return;}
  const item=listings.find(l=>l.id===selId);if(!item)return;
  bookingDone=true;item.bookedDates=[...(item.bookedDates||[]),...selDays];
  document.getElementById('confirm-box').classList.add('on');
  document.getElementById('d-phone').textContent=item.phone||'Contact via app';
  document.getElementById('d-wa-info').textContent=`${payMethod==='airtel'?'Airtel Money':'TNM Mpamba'}: ${item.phone}`;
  document.getElementById('main-btn-area').style.display='none';
  renderCal();saveStorage();
}

function openWA(){const item=listings.find(l=>l.id===selId);if(!item)return;const p=(item.phone||'').replace(/\s/g,'');const msg=encodeURIComponent(`Hi ${item.owner}, I booked "${item.name}" on LendIt Malawi for ${selDays.length} day(s). Please confirm pickup. — ${session?session.name:'Borrower'}`);const url=`https://wa.me/265${p.replace(/^0/,'')}?text=${msg}`;if(typeof openLink==='function')openLink(url);else window.open(url,'_blank');}

function renderReviews(){
  const item=listings.find(l=>l.id===selId);if(!item)return;
  const revs=item.reviews||[];
  document.getElementById('rev-count').textContent=revs.length;
  const rl=document.getElementById('reviews-list');
  if(!revs.length){rl.innerHTML=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:0.5rem">${lang==='en'?'No reviews yet. Be the first!':'Palibe maganizo.'}</div>`;return;}
  rl.innerHTML=revs.map(r=>`<div class="review-card"><div class="review-top"><div class="avatar">${r.name.charAt(0).toUpperCase()}</div><div><div class="review-name">${r.name}</div><div style="color:var(--a);font-size:12px">${stars(r.stars)}</div></div></div><p class="review-text">${r.text}</p></div>`).join('');
}
function setStar(n){selStar=n;document.querySelectorAll('#star-pick button').forEach((b,i)=>b.textContent=i<n?'★':'☆');}
function submitReview(){
  const item=listings.find(l=>l.id===selId);if(!item)return;
  const text=document.getElementById('rev-text').value.trim();
  const name=session?session.name.split(' ')[0]:'Anonymous';
  if(!selStar||!text){alert(lang==='en'?'Please give stars and write something.':'Sankhani nyenyezi ndilembe kanthu.');return;}
  if(!item.reviews)item.reviews=[];
  item.reviews.unshift({name,stars:selStar,text});
  document.getElementById('rev-text').value='';setStar(0);renderReviews();saveStorage();
}

async function submitListing(){
  if(!session){guardNav('list');return;}
  const name=document.getElementById('f-name').value.trim();
  const price=parseInt(document.getElementById('f-price').value)||0;
  const dep=parseInt(document.getElementById('f-dep').value)||0;
  const loc=document.getElementById('f-loc').value.trim();
  if(!name||!price||!loc){alert(t('errFill'));return;}
  const btn=document.getElementById('list-submit-btn');
  btn.innerHTML=`<span class="loading-spin"></span> Publishing...`;btn.disabled=true;
  const item={id:Date.now(),name,desc:document.getElementById('f-desc').value.trim()||name,price,deposit:dep,location:loc,category:document.getElementById('f-cat').value,payMethod:document.getElementById('f-pay').value,owner:session.name,phone:session.phone,emoji:document.getElementById('f-emoji').value,lat:userLat,lng:userLng,bookedDates:[],reviews:[],userId:session.id};
  myListings.push(item);listings.push(item);
  await saveStorage();
  ['f-name','f-desc','f-price','f-dep','f-loc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  btn.textContent=t('fSubmit');btn.disabled=false;
  const sb=document.getElementById('s-bar');if(sb){sb.textContent=`✓ "${name}" ${lang==='en'?'published successfully!':'yalembedwa bwino!'}`;sb.style.display='block';setTimeout(()=>sb.style.display='none',5000);}
  document.getElementById('stat-n').textContent=listings.length;
}

async function init(){
  await loadStorage();
  updateTexts();
  renderHomeGrid();
  renderBrowseGrid();
}
init();
</script>
